<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B0F12"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#1F272D" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent shapes -->
  <circle cx="200" cy="120" r="180" fill="#F5A623" opacity="0.05"/>
  <circle cx="1050" cy="500" r="250" fill="#4ECDC4" opacity="0.05"/>
  
  <!-- Logo icon -->
  <g transform="translate(540, 120) scale(2)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#F5A623"/>
    <path d="M10 45c5-12 13-22 20-28 7 6 15 16 20 28H10z" fill="#0B0F12"/>
    <circle cx="30" cy="25" r="7" fill="#F5A623"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#F0F2F5">Palworld Breeding Calculator</text>
  
  <!-- Subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#B8BFC6">Forward + Reverse + Shareable Results · Updated for Feybreak</text>
  
  <!-- URL -->
  <text x="600" y="450" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="600" fill="#F5A623">palbreedingcalculator.net</text>
  
  <!-- Type dots -->
  <g transform="translate(420, 500)">
    <circle cx="0" cy="0" r="8" fill="#9CA3AF"/>
    <circle cx="40" cy="0" r="8" fill="#EF4444"/>
    <circle cx="80" cy="0" r="8" fill="#3B82F6"/>
    <circle cx="120" cy="0" r="8" fill="#22C55E"/>
    <circle cx="160" cy="0" r="8" fill="#EAB308"/>
    <circle cx="200" cy="0" r="8" fill="#06B6D4"/>
    <circle cx="240" cy="0" r="8" fill="#A16207"/>
    <circle cx="280" cy="0" r="8" fill="#8B5CF6"/>
    <circle cx="320" cy="0" r="8" fill="#4F46E5"/>
  </g>
</svg>
